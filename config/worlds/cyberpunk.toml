[world]
name = "네오서울 2087"
genre = "사이버펑크"
tone = "dark"
description = """2087년, 서울은 초거대 기업들이 지배하는 네오서울로 변모했다.
하층 구역의 해커이자 정보 브로커인 당신은 어느 날 익명의 의뢰를 받는다.
의뢰 내용: "아리아 테크의 비밀 프로젝트 '이카루스'의 정보를 빼내라."
그것이 당신의 운명을 바꿀 줄은 몰랐다..."""
starting_scenario = "당신은 하층 구역 B-7의 좁은 아지트에서 눈을 뜬다. 홀로그램 모니터에 익명의 메시지가 깜빡이고 있다."

[rules]
system_rules = """- 해킹, 전투, 대화 각각에 스킬 체크 존재
- 사이버웨어 장착으로 능력 강화 가능 (부작용 존재)
- 기업 호감도 시스템: 행동에 따라 각 기업과의 관계 변화
- 사망 시 체크포인트에서 복귀"""
