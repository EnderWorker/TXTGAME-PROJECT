[world]
name = "데드 데이즈"
genre = "좀비 서바이벌"
tone = "survival_horror"
description = """원인 불명의 바이러스가 퍼진 지 30일. 대한민국 인구의 80%가 감염되었다.
군대와 정부는 기능을 잃었고, 살아남은 사람들은 각자도생 중이다.
당신은 서울 외곽의 한 아파트에서 가까스로 살아남았다.
식량은 3일치, 무기는 부엌칼 하나..."""
starting_scenario = "새벽 5시. 당신은 아파트 12층에서 깨어난다. 바깥에서 간간이 신음 소리가 들린다. 냉장고에는 물 2병과 컵라면 3개가 전부다."

[rules]
system_rules = """- 생존 시뮬레이션: 배고픔, 갈증, 피로, 체온 관리
- 소음 시스템: 큰 소리는 좀비를 끌어모음
- 물자는 항상 부족하며 선택에 트레이드오프 존재
- 다른 생존자와의 관계 (신뢰/적대)
- 사망 시 영구 사망 (로그라이크 모드 선택 가능)"""
