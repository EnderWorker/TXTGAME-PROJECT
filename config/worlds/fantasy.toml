[world]
name = "엘도라의 잃어버린 왕국"
genre = "중세 판타지"
tone = "epic"
description = """한때 번영했던 엘도라 대륙은 어둠의 군주 모르간의 부활로 혼란에 빠졌다.
다섯 왕국의 동맹은 무너졌고, 마법의 원천인 세계수가 병들기 시작했다.
모험가 길드에 새로 등록한 당신에게, 운명적인 의뢰가 도착한다..."""
starting_scenario = "당신은 항구도시 리벤델의 모험가 길드 앞에 서 있다. 길드 게시판에는 다양한 의뢰서가 붙어있고, 안쪽에서는 모험가들의 웅성거림이 들린다."

[rules]
system_rules = """- 전투 시 주사위 판정을 시뮬레이션하여 성공/실패 결정
- 레벨업은 주요 사건 해결 시 진행
- 사망 시 마지막 세이브 포인트로 복귀 가능
- NPC는 개성 있는 대화를 구사
- 아이템에는 희귀도 등급 존재 (일반/희귀/전설)"""
